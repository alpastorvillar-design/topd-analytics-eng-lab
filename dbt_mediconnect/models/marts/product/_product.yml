version: 2

models:
  - name: mart_patient_retention
    description: >
      Cohort retention analysis. One row per cohort_month × months_since_acquisition.
      Measures what % of patients who first booked in a given month returned in subsequent months.
    columns:
      - name: cohort_month
        description: Month of patient's first completed appointment (cohort definition)
        tests:
          - not_null
      - name: months_since_acquisition
        description: Months elapsed since cohort_month (0 = acquisition month)
        tests:
          - not_null
      - name: cohort_size
        description: Total number of patients in this cohort
        tests:
          - not_null
      - name: retained_patients
        description: Patients from the cohort who had a completed appointment this month
        tests:
          - not_null
      - name: retention_rate
        description: retained_patients / cohort_size (NULL-safe)

  - name: mart_doctor_supply_demand
    description: >
      Supply vs demand metrics per specialty, country and month. Highlights
      under-supplied specialties for marketplace management.
    columns:
      - name: specialty_id
        tests:
          - not_null
      - name: country_id
        tests:
          - not_null
      - name: month
        tests:
          - not_null
      - name: total_appointments
        description: Total appointments booked in the period
      - name: active_doctors_with_appointments
        description: Distinct doctors who had at least one appointment
      - name: appointments_per_doctor
        description: Demand/supply ratio - above 1 means more appointments than active doctors

  - name: mart_appointment_quality
    description: >
      Quality metrics per channel × specialty × country per month.
      Used to identify where no-shows and cancellations concentrate.
    columns:
      - name: month
        tests:
          - not_null
      - name: channel
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['web', 'app', 'phone', 'clinic']
      - name: specialty_id
        tests:
          - not_null
      - name: country_id
        tests:
          - not_null
      - name: completion_rate
        description: completed / total appointments
      - name: no_show_rate
        description: no_show / total appointments
      - name: cancellation_rate
        description: cancelled / total appointments
