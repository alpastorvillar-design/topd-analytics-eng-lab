version: 2

models:
  - name: dim_patients
    description: "Dimensión de pacientes con métricas de ciclo de vida y segmento."
    columns:
      - name: patient_id
        data_tests: [unique, not_null]
      - name: country_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_countries')
                field: country_id
      - name: patient_segment
        data_tests:
          - accepted_values:
              arguments:
                values: ['new', 'active', 'loyal', 'champion', 'unknown']

  - name: dim_doctors
    description: "Dimensión de médicos con métricas de rendimiento y ranking."
    columns:
      - name: doctor_id
        data_tests: [unique, not_null]
      - name: specialty_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_specialties')
                field: specialty_id
      - name: country_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_countries')
                field: country_id
      - name: is_active
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: dim_specialties
    description: "Catálogo de especialidades médicas."
    columns:
      - name: specialty_id
        data_tests: [unique, not_null]

  - name: dim_countries
    description: "Catálogo de países."
    columns:
      - name: country_id
        data_tests: [unique, not_null]

  - name: fct_appointments
    description: "Hechos de citas. Particionado por mes, clusterizado por país/especialidad/status. Materialización incremental con merge."
    columns:
      - name: appointment_id
        data_tests: [unique, not_null]
      - name: patient_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_patients')
                field: patient_id
      - name: doctor_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_doctors')
                field: doctor_id
      - name: specialty_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_specialties')
                field: specialty_id
      - name: country_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_countries')
                field: country_id
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['completed', 'cancelled', 'no_show', 'scheduled']
      - name: channel
        data_tests:
          - accepted_values:
              arguments:
                values: ['web', 'app', 'phone', 'clinic']
      - name: appointment_date
        data_tests:
          - not_null

  - name: fct_payments
    description: "Hechos de pagos. Particionado por mes de pago."
    columns:
      - name: payment_id
        data_tests: [unique, not_null]
      - name: appointment_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_appointments')
                field: appointment_id
      - name: specialty_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_specialties')
                field: specialty_id
      - name: country_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_countries')
                field: country_id
      - name: amount_cents
        data_tests:
          - not_null
      - name: payment_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['paid', 'refunded', 'failed', 'pending']

  - name: fct_leads
    description: "Hechos de leads con funnel completo lead -> cita -> pago."
    columns:
      - name: lead_id
        data_tests: [unique, not_null]
      - name: specialty_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_specialties')
                field: specialty_id
      - name: country_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_countries')
                field: country_id
      - name: lead_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['new', 'contacted', 'converted', 'lost']
      - name: days_lead_to_appointment
        description: Days from lead creation to first appointment. NULL if not converted.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "days_lead_to_appointment is not null"
                severity: warn
      - name: days_appointment_to_payment
        description: Days from appointment to payment capture. NULL if not paid.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "days_appointment_to_payment is not null"
