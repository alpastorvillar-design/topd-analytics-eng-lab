name: 'mediconnect'
version: '1.0.0'
config-version: 2

profile: 'mediconnect'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

snapshots:
  mediconnect:
    +target_schema: dbt_snapshots

vars:
  # Dev filter: cuando is_dev=true, los facts se limitan a los últimos
  # `dev_window_days` días contando desde MAX(fecha) del dataset (no de today).
  # Esto mantiene cobertura aunque los datos sintéticos sean antiguos.
  is_dev: false
  dev_window_days: 90
  project_id: "topd-lab"
  bq_location: "EU"

models:
  mediconnect:
    staging:
      +materialized: view
      +dataset: dbt_staging
    intermediate:
      +materialized: view
      +dataset: dbt_intermediate
    marts:
      core:
        +materialized: table
        +dataset: dbt_marts
      product:
        +materialized: table
        +dataset: dbt_marts
      executive:
        +materialized: table
        +dataset: dbt_marts
